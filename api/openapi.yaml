      - oauth2:
        - get:/timeline
        - mydex:pdx
      summary: Retrieve list of timeline items.
      tags:
      - Timeline
  /timeline/single-item:
    get:
      description: Returns a single timeline item based on feature block and feature
        block id requested e.g. a 'referral' with id 123.
      operationId: getTimelineItem
      parameters:
      - description: Member's Connection Key
        explode: false
        in: header
        name: Connection-Token
        required: true
        schema:
          example: abc123xyz456
          type: string
        style: simple
      - description: The unique ID of a mydex member
        explode: true
        in: query
        name: uid
        required: true
        schema:
          example: "1234"
          type: string
        style: form
      - description: The connection_id is a shared id between a connection and a member.
          It is a hyphenated combination of the member UID and the Dedicated Connection
          NID.
        explode: true
        in: query
        name: con_id
        required: true
        schema:
          example: 1234-67890
          type: string
        style: form
      - description: The feature block the teimline item belongs to
        explode: true
        in: query
        name: feature_block
        required: true
        schema:
          enum:
          - referrals
          - secure_messages
          - calendar
          example: referrals
          type: string
        style: form
      - description: "The specific ID of the record within the specified feature block\
          \ e.g. if 'referrals' is the feature block, then this should be a specific\
          \ referral id"
        explode: true
        in: query
        name: feature_block_id
        required: true
        schema:
          example: 123
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineSingleItemResponse"
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
          description: Unauthorized
      security:
      - oauth2:
        - get:/timeline/single-item
        - mydex:pdx
      summary: Retrieve a single timeline item.
      tags:
      - Timeline
components:
  parameters:
    ConnectionToken:
      description: Member's Connection Key
      explode: false
      in: header
      name: Connection-Token
      required: true
      schema:
        example: abc123xyz456
        type: string
      style: simple
    Uid:
      description: The unique ID of a mydex member
      explode: true
      in: query
      name: uid
      required: true
      schema:
        example: "1234"
        type: string
      style: form
    ConId:
      description: The connection_id is a shared id between a connection and a member.
