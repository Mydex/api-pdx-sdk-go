        - mydex:pdx
      summary: Retrieve all secure messages for a given conversation.
      tags:
      - Secure Messages
  /timeline:
    get:
      description: "Returns a list of timeline items which includes: referrals, calendar\
        \ events and secure messages."
      operationId: getTimeline
      parameters:
      - description: Member's Connection Key
        explode: false
