openapi: 3.0.0
info:
  description: "API for processing subscribers requests to the PDX API to retrieve\
    \ one or more combinations of data, deliver and update records in a Members PDS\
    \ and ensure record integrity is maintained."
  title: PDX API
  version: 1.0.0
servers:
- description: PDX-API host.
  url: https://api.mydex.org
tags:
- description: Operations related to calendar events
  name: Calendar
- description: Operations related to referrals
  name: Referrals
- description: Operations related to secure messages
  name: Secure Messages
- description: Operations related to timeline
  name: Timeline
paths:
  /calendar/add-event:
    post:
      description: Creates a new event in the user's calendar.
      operationId: postCalendarEvent
      parameters:
      - description: Member's Connection Key
        explode: false
        in: header
        name: Connection-Token
        required: true
        schema:
          example: abc123xyz456
          type: string
        style: simple
      - description: The unique ID of a mydex member
        explode: true
        in: query
        name: uid
        required: true
        schema:
          example: "1234"
          type: string
        style: form
      - description: The connection_id is a shared id between a connection and a member.
          It is a hyphenated combination of the member UID and the Dedicated Connection
          NID.
        explode: true
        in: query
        name: con_id
        required: true
        schema:
          example: 1234-67890
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventCreateRequestBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResponse"
          description: Successfully created record.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
          description: Unauthorized
      security:
      - oauth2:
        - post:/calendar/add-event
        - mydex:pdx
      summary: Supports adding a calendar-event.
      tags:
      - Calendar
  /calendar/add-appointment:
    post:
      description: Creates a new appointment in the user's calendar. An appointment
        must be made within a specified context e.g. a 'Referral'
      operationId: postCalendarAppointment
      parameters:
      - description: Member's Connection Key
        explode: false
        in: header
        name: Connection-Token
        required: true
        schema:
          example: abc123xyz456
          type: string
        style: simple
      - description: The unique ID of a mydex member
        explode: true
        in: query
        name: uid
        required: true
        schema:
          example: "1234"
          type: string
        style: form
      - description: The connection_id is a shared id between a connection and a member.
          It is a hyphenated combination of the member UID and the Dedicated Connection
          NID.
        explode: true
        in: query
        name: con_id
        required: true
        schema:
          example: 1234-67890
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarAppointmentCreateRequestBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResponse"
          description: Successfully created record.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
          description: Unauthorized
      security:
      - oauth2:
        - post:/calendar/add-appointment
        - mydex:pdx
      summary: Supports adding a calendar-appointment.
      tags:
      - Calendar
  /calendar/get-events:
    get:
      description: Returns a list of calendar events.
      operationId: getCalendarEvents
      parameters:
      - description: Member's Connection Key
        explode: false
        in: header
        name: Connection-Token
        required: true
        schema:
          example: abc123xyz456
          type: string
        style: simple
      - description: The unique ID of a mydex member
        explode: true
        in: query
        name: uid
        required: true
        schema:
          example: "1234"
          type: string
        style: form
      - description: The connection_id is a shared id between a connection and a member.
          It is a hyphenated combination of the member UID and the Dedicated Connection
          NID.
        explode: true
        in: query
        name: con_id
        required: true
        schema:
          example: 1234-67890
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEventsResponse"
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
          description: Unauthorized
      security:
      - oauth2:
        - get:/calendar/get-events
        - mydex:pdx
      summary: Retrieve calendar events
      tags:
      - Calendar
  /calendar/get-appointments:
    get:
      description: Returns a list of appointments filtered by context and context_id.
      operationId: getCalendarAppointments
      parameters:
      - description: Member's Connection Key
        explode: false
        in: header
        name: Connection-Token
        required: true
        schema:
          example: abc123xyz456
          type: string
        style: simple
      - description: The unique ID of a mydex member
        explode: true
        in: query
        name: uid
        required: true
        schema:
          example: "1234"
          type: string
        style: form
      - description: The connection_id is a shared id between a connection and a member.
          It is a hyphenated combination of the member UID and the Dedicated Connection
          NID.
        explode: true
        in: query
        name: con_id
        required: true
        schema:
          example: 1234-67890
          type: string
        style: form
      - description: The context this belongs to
        explode: true
        in: query
        name: context
        required: true
        schema:
          example: referral
          type: string
        style: form
      - description: The specific ID of the context record
        explode: true
        in: query
        name: context_id
        required: true
        schema:
          example: 123
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppointmentsResponse"
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
          description: Unauthorized
      security:
      - oauth2:
        - get:/calendar/get-appointments
        - mydex:pdx
      summary: Retrieve appointments for a given context
      tags:
      - Calendar
  /calendar/update-event:
    put:
      description: "Updates an event in the user's calendar. For example, updating\
        \ the 'status' from 'INVITED' to 'CONFIRMED' when a user accepts the invitation\
