      - description: The connection_id is a shared id between a connection and a member.
          It is a hyphenated combination of the member UID and the Dedicated Connection
          NID.
        explode: true
        in: query
        name: con_id
        required: true
        schema:
          example: 1234-67890
          type: string
        style: form
      - description: The record id requested.
        explode: true
        in: query
        name: id
        required: true
        schema:
          example: "1234"
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
