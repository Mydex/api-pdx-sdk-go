          description: Title of the event
          example: Lunch with Ellen
          type: string
        description:
          description: Detailed description of the event
          example: Meeting to discuss expectations
          type: string
        start_timestamp:
          description: Start date and time as Unix timestamp
          example: 1754289000
          format: int64
          type: integer
        end_timestamp:
          description: End date and time as Unix timestamp
          example: 1754289000
