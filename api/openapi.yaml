  /secure-messages/receive:
    post:
      description: Creates a new received message in the member's PDS.
      operationId: postSecureMessageReceive
      parameters:
      - description: Member's Connection Key
        explode: false
        in: header
        name: Connection-Token
        required: true
        schema:
          example: abc123xyz456
          type: string
        style: simple
      - description: The unique ID of a mydex member
        explode: true
        in: query
        name: uid
        required: true
