      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResponse"
          description: Successfully created record.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
          description: Unauthorized
      security:
      - oauth2:
        - post:/secure-messages/receive
        - mydex:pdx
      summary: Supports sending a message to the member's PDS.
      tags:
      - Secure Messages
  /secure-messages/conversation:
    get:
      description: Returns a list of secure messages that form part of a conversation.
      operationId: getSecureMessageConversation
      parameters:
      - description: Member's Connection Key
        explode: false
        in: header
        name: Connection-Token
        required: true
        schema:
          example: abc123xyz456
          type: string
        style: simple
      - description: The unique ID of a mydex member
        explode: true
        in: query
        name: uid
        required: true
        schema:
          example: "1234"
          type: string
        style: form
      - description: The connection_id is a shared id between a connection and a member.
          It is a hyphenated combination of the member UID and the Dedicated Connection
          NID.
        explode: true
        in: query
        name: con_id
        required: true
        schema:
          example: 1234-67890
          type: string
        style: form
      - description: The specific ID of the conversation that groups messages together
        explode: true
        in: query
        name: conversation_id
        required: true
        schema:
          example: referral-123
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecureMessageConversationResponse"
          description: Successful response
        "401":
          content:
            application/json:
