          description: Unauthorized
      security:
      - oauth2:
        - get:/referrals/read-single
        - mydex:pdx
      summary: Retrieve a single referral by id for a given member.
      tags:
      - Referrals
  /referrals/update-status:
    put:
      description: "Updates the status of a member's referral specified by id. For\
        \ example, having been referred to a service, the status is set by default\
        \ to 'Referred' and this route enables it to be updated to 'Accepted' or 'Rejected'"
      operationId: updateReferralStatus
      parameters:
      - description: Member's Connection Key
        explode: false
        in: header
        name: Connection-Token
        required: true
        schema:
          example: abc123xyz456
          type: string
        style: simple
      - description: The unique ID of a mydex member
        explode: true
        in: query
        name: uid
        required: true
        schema:
          example: "1234"
          type: string
        style: form
      - description: The connection_id is a shared id between a connection and a member.
          It is a hyphenated combination of the member UID and the Dedicated Connection
          NID.
        explode: true
        in: query
        name: con_id
        required: true
        schema:
          example: 1234-67890
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferralStatusUpdateRequestBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResponse"
          description: Successfully created record.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
          description: Unauthorized
      security:
      - oauth2:
        - put:/referrals/update-status
        - mydex:pdx
      summary: Supports updating the status of a referral.
      tags:
      - Referrals
  /secure-messages/send:
