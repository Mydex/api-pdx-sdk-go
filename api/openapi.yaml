              schema:
                $ref: "#/components/schemas/ReferralListResponse"
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
          description: Unauthorized
      security:
      - oauth2:
        - get:/referrals/read-all
        - mydex:pdx
      summary: Retrieve rall referrals for a given member.
      tags:
      - Referrals
  /referrals/read-single:
    get:
      description: Returns the requested referral.
      operationId: getSingleReferral
      parameters:
      - description: Member's Connection Key
        explode: false
        in: header
        name: Connection-Token
        required: true
        schema:
          example: abc123xyz456
          type: string
        style: simple
      - description: The unique ID of a mydex member
        explode: true
        in: query
        name: uid
        required: true
