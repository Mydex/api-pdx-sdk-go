      description: Creates a new sent message in the member's PDS.
      operationId: postSecureMessageSend
      parameters:
      - description: Member's Connection Key
        explode: false
        in: header
        name: Connection-Token
        required: true
        schema:
          example: abc123xyz456
          type: string
        style: simple
      - description: The unique ID of a mydex member
        explode: true
        in: query
