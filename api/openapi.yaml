          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventDeleteRequestBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
          description: Successfully created record.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
          description: Unauthorized
      security:
      - oauth2:
        - delete:/calendar/delete-event
        - mydex:pdx
      summary: Supports deleting a calendar-event.
      tags:
      - Calendar
  /referrals/self-refer:
